[App]
; Script/application version. Keep in sync with release notes.
Version=2.0.5


[Debug]
; Enable log file output for diagnostics (0=off, 1=on).
Enabled=0

; More detailed debug output in logs (0=normal, 1=verbose).
Verbose=1


[General]
; Switch desktops by scrolling over taskbar/bottom edge (0=off, 1=on).
TaskbarScrollSwitching=1

; Restrict scroll switching to monitor bottom edge only (0=whole taskbar window area, 1=bottom edge only).
TaskbarScrollBottomEdgeOnly=1

; Use native Windows desktop switching behavior where applicable (0=custom flow, 1=native flow).
UseNativeDesktopSwitching=0

; Wrap when reaching first/last desktop during previous/next navigation (0=clamp, 1=wrap).
DesktopWrapping=1

; Limit how many desktops participate in cyclic navigation; 0 means all detected desktops.
NumberOfCyclableDesktops=6

; Custom icon directory for tray desktop icons; empty uses default "icons/".
IconDir=

; Apply AutoHotkey hotkey burst limits from settings below (0=disabled, 1=enabled).
HotkeyBurstTuningEnabled=1

; AutoHotkey max hotkeys per interval before built-in warning handling.
MaxHotkeysPerInterval=140

; AutoHotkey interval length in milliseconds for MaxHotkeysPerInterval.
HotkeyIntervalMs=1000

; Before plain desktop switch, move focus away from active app window to reduce activation/taskbar flicker race.
TaskbarAntiFlickerDefocusBeforeSwitch=1

; Enable soft taskbar refresh after each desktop switch (0=off, 1=on).
TaskbarAntiFlickerRefreshOnSwitch=0

; First refresh delay in milliseconds (small debounce for immediate repaint race).
TaskbarAntiFlickerRefreshDebounceMs=120

; Second refresh delay in milliseconds (late stabilization pass after burst switching).
TaskbarAntiFlickerRefreshSecondPhaseMs=260


[Tooltips]
; Show desktop and action tooltips (0=off, 1=on).
Enabled=1

; One of LEFT, CENTER, RIGHT

; Horizontal tooltip anchor position.
PositionX=CENTER

; One of TOP, CENTER, BOTTOM

; Vertical tooltip anchor position.
PositionY=CENTER

; Tooltip font size in points.
FontSize=16

; Tooltip font family name.
FontName=Segoe UI

; Tooltip text color (hex RGB, e.g. 0xFFFFFF).
FontColor=0xFFFFFF

; Tooltip font weight (0=normal, 1=bold).
FontInBold=0

; Tooltip background color (hex RGB).
BackgroundColor=0x1F1F1F

; Tooltip visible duration in milliseconds.
Lifespan=750

; Render tooltip on every monitor (0=current monitor only, 1=all monitors).
OnEveryMonitor=1

; Horizontal margin from selected anchor point.
MarginX=40

; Vertical margin from selected anchor point.
MarginY=20

; Make tooltip ignore mouse input (0=interactive, 1=click-through).
ClickThrough=1

; Rounded tooltip corners (0=off, 1=on).
RoundedCorners=1

; Minimum tooltip width in pixels.
MinWidth=40

; Minimum tooltip height in pixels.
MinHeight=40


[KeyboardShortcutsCombinations]
; Toggle pin/unpin current window across desktops.
TogglePinWindow=Win, Ctrl, Shift, W

; Toggle pin/unpin current app across desktops.
TogglePinApp=Win, Ctrl, Shift, A

; Explicit pin current window (optional, empty disables).
PinWindow=

; Explicit pin current app (optional, empty disables).
PinApp=

; Explicit unpin current window (optional, empty disables).
UnpinWindow=

; Explicit unpin current app (optional, empty disables).
UnpinApp=

; Toggle Always-On-Top for active window.
TogglePinOnTop=Win, Ctrl, Shift, T

; Set Always-On-Top for active window.
PinOnTop=Win, Ctrl, T

; Remove Always-On-Top from active window.
UnpinFromTop=Win, Ctrl, Alt, T

; Open desktop name rename dialog.
ChangeDesktopName=Win, F2


[KeyboardShortcutsModifiers]
; Modifiers for direct switch to desktop number hotkeys.
SwitchDesktopNum=Win, Ctrl

; Modifiers for previous/next desktop switching.
SwitchDesktopDir=Win, Ctrl

; Modifiers for move-window-and-switch direction hotkeys.
MoveWindowAndSwitchToDesktopDir=Win, Ctrl, Shift

; Modifiers for move-window-only direction hotkeys.
MoveWindowToDesktopDir=Win, Ctrl, Shift, Alt


[KeyboardShortcutsIdentifiers]
; Key identifier for previous desktop action.
PreviousDesktop=Left

; Key identifier for next desktop action.
NextDesktop=Right

; Numpad0 with Win, Ctrl, Shift modifiers does not work

; if you need ability to move and switch last active desctop

; setup other keys

; Key identifier for switch to last active desktop.
LastActiveDesktop=

; Key identifier for switch to the default desktop (empty disables).
DefaultDesktop=Numpad0

; Default desktop number used by the shortcut above (1..9).
DefaultDesktopNumber=1

; Direct switch key identifiers for desktops 1..9.
Desktop1=1
Desktop2=2
Desktop3=3
Desktop4=4
Desktop5=5
Desktop6=6
Desktop7=7
Desktop8=8
Desktop9=9

; Alternative key identifiers for desktops 1..9 (often numpad aliases).
DesktopAlt1=Numpad1
DesktopAlt2=Numpad2
DesktopAlt3=Numpad3
DesktopAlt4=Numpad4
DesktopAlt5=Numpad5
DesktopAlt6=Numpad6
DesktopAlt7=Numpad7
DesktopAlt8=Numpad8
DesktopAlt9=Numpad9


